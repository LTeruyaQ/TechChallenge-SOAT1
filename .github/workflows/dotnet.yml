name: .NET


on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 9.0.x
    - name: Restore dependencies
      run: dotnet restore MecanicaOS.sln
    - name: Build
      run: dotnet build MecanicaOS.sln --no-restore
    - name: Test
      run: dotnet test test/MecanicaOSTests/MecanicaOSTests.csproj --collect:"XPlat Code Coverage" --logger "console;verbosity=detailed"
    - name: Code Coverage Report
      uses: danielpalme/ReportGenerator-GitHub-Action@5.1.26
      with:
        reports: "**/coverage.cobertura.xml"
        targetdir: "coveragereport"
        reporttypes: "Html"
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create_pr:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/feature/')
    steps:
      - uses: actions/checkout@v3
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: new feature"
          title: "PR for feature branch"
          body: "This PR was auto-generated."
          branch: ${{ github.ref }}
          base: main
